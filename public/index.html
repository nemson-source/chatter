<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Synchronized Interface Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root {
    --bg-main: #212121;
    --bg-sidebar: #171717;
    --bg-message-user: #2f2f2f;
    --text-primary: #ececec;
    --text-secondary: #b4b4b4;
    --border-color: #424242;
    --accent: #10a37f;
    --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

* { box-sizing: border-box; }
body {
    margin: 0;
    display: flex;
    position: absolute;
    top: 0;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--bg-main);
    color: var(--text-primary);
    font-family: var(--font-stack);
    overflow: hidden;
}

/* SIDEBAR LAYOUT STYLES */
#sidebar {
    width: 280px;
    background: var(--bg-sidebar);
    display: flex;
    flex-direction: column;
    padding: 12px;
    border-right: 1px solid var(--border-color);
    transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 1000;
}

.sidebar-header-actions {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
}

#newChat {
    flex: 1;
    padding: 12px;
    background: transparent;
    border: 1px solid var(--border-color);
    border-radius: 8px;
    color: var(--text-primary);
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

#massDeleteBtn {
    background: transparent;
    border: 1px solid #cc241d;
    color: #ff6b6b;
    border-radius: 8px;
    padding: 0 12px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
}

#chatList {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.chat-item-wrapper {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px;
    border-radius: 8px;
    transition: background 0.15s;
}
.chat-item-wrapper:hover, .chat-item-wrapper.active {
    background: var(--bg-main);
}

.delete-checkbox {
    width: 18px;
    height: 18px;
    accent-color: #cc241d;
    cursor: pointer;
}

.chat-item-link {
    flex: 1;
    cursor: pointer;
    font-size: 14px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text-primary);
}

/* MAIN VIEWPORT PANELS */
#main {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100%;
    position: relative;
    min-width: 0;
}

#topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--bg-main);
    border-bottom: 1px solid var(--border-color);
    flex-shrink: 0;
}

.nav-toggle-btn {
    display: none;
    background: transparent;
    border: 1px solid var(--border-color);
    color: var(--text-primary);
    padding: 8px;
    border-radius: 6px;
    cursor: pointer;
}

.topbar-controls {
    display: flex;
    gap: 8px;
}

#topbar button.cfg-btn {
    background: transparent;
    border: 1px solid var(--border-color);
    color: var(--text-secondary);
    padding: 8px 14px;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
}

#chat {
    flex: 1;
    overflow-y: auto;
    padding: 12px 0;
    min-height: 0;
}

.message-wrapper {
    width: 100%;
    display: flex;
    padding: 12px 16px;
    justify-content: center;
}

.message-container {
    width: 100%;
    max-width: 720px;
}

.msg-header {
    font-weight: 600;
    font-size: 13px;
    margin-bottom: 4px;
}
.user-wrapper { justify-content: flex-end; }
.user-wrapper .message-container { display: flex; flex-direction: column; align-items: flex-end; }
.user-wrapper .msg-body {
    background: var(--bg-message-user);
    padding: 10px 16px;
    border-radius: 18px;
    max-width: 85%;
}

.ai-wrapper .msg-header { color: var(--accent); text-transform: capitalize; }
.msg-body { font-size: 15px; word-break: break-word; }
.msg-body p { margin: 0 0 8px 0; }
.msg-body p:last-child { margin-bottom: 0; }
.msg-body pre { background: #0d0d0d; padding: 12px; border-radius: 8px; overflow-x: auto; }

#input-area {
    padding: 12px 16px;
    background: var(--bg-main);
    flex-shrink: 0;
    z-index: 10;
}

.input-container-wrapper {
    display: flex;
    width: 100%;
    max-width: 720px;
    margin: 0 auto;
    gap: 8px;
    align-items: center;
}

#form {
    flex: 1;
    position: relative;
    background: var(--bg-message-user);
    border-radius: 24px;
    display: flex;
    padding: 4px 8px;
}

#message {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text-primary);
    padding: 12px;
    font-size: 16px;
}

#form button {
    background: var(--text-primary);
    border: none;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    align-self: center;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
}

.clear-logs-btn {
    background: transparent;
    border: 1px solid var(--border-color);
    color: #ff6b6b;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
}
.clear-logs-btn:hover {
    background: rgba(204, 36, 29, 0.15);
}

#sidebarOverlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 999;
}

/* SETTINGS MODAL INTERFACES */
#modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 10000;
    align-items: center;
    justify-content: center;
}
#modalContent {
    background: #2f2f2f;
    width: 92%;
    max-width: 500px;
    border-radius: 12px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    max-height: 80vh;
}
#characters-list-zone { overflow-y: auto; margin-bottom: 12px; display: flex; flex-direction: column; gap: 8px; }
.character-card { background: var(--bg-main); padding: 10px; border-radius: 6px; display: flex; align-items: center; justify-content: space-between; }
.input-group { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
.input-group label { font-size: 12px; color: var(--text-secondary); }
.input-group input, .input-group textarea { background: var(--bg-main); border: 1px solid var(--border-color); color: var(--text-primary); padding: 10px; border-radius: 6px; outline: none; font-family: var(--font-stack); }
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 10px; }
.modal-actions button { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; }
#save { background: var(--accent); color: white; }

/* PHONE MOBILE ADAPTIVE VIEWPORTS BREAKPOINT */
@media (max-width: 768px) {
    #sidebar {
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        transform: translateX(-100%);
    }
    #sidebar.open { 
        transform: translateX(0); 
    }
    .nav-toggle-btn { 
        display: block; 
    }
    #sidebarOverlay.open { 
        display: block; 
    }

    #topbar {
        padding: 8px;
        gap: 4px;
    }
    #topbar button.cfg-btn {
        padding: 6px 8px;
        font-size: 11px;
    }
}
</style>
</head>
<body>

<div id="sidebarOverlay"></div>

<div id="sidebar">
    <div class="sidebar-header-actions">
        <button id="newChat">
            <span>New Chat</span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        </button>
        <button id="massDeleteBtn" title="Delete selected threads">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
        </button>
    </div>
    <div id="chatList"></div>
</div>

<div id="main">
    <div id="topbar">
        <button class="nav-toggle-btn" id="menuToggle">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
        <div class="topbar-controls">
            <button class="cfg-btn" id="charBtn">Characters</button>
            <button class="cfg-btn" id="worldBtn">World</button>
            <button class="cfg-btn" id="logoutBtn" style="border-color:#cc241d;color:#ff6b6b;">Switch Account</button>
        </div>
    </div>

    <div id="chat"></div>

    <div id="input-area">
        <div class="input-container-wrapper">
            <button id="clearLogsBtn" class="clear-logs-btn" title="Clear conversation history text only">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"></path><path d="m8 11 4 4 4-4"></path><path d="M12 8v7"></path></svg>
            </button>
            <form id="form">
                <input id="message" autocomplete="off" placeholder="Send message..." />
                <button id="sendBtn" type="submit">
                    <svg width="16" height="16" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </form>
        </div>
    </div>
</div>

<div id="modal">
    <div id="modalContent">
        <h3 id="modalTitle">Configuration</h3>
        <div id="characters-list-zone"></div>
        <div id="charInputs" class="input-group">
            <label>Character Name</label>
            <input type="text" id="charNameInput" />
        </div>
        <div class="input-group">
            <label id="textInputLabel">Context Parameters</label>
            <textarea id="modalText"></textarea>
        </div>
        <div class="modal-actions">
            <button class="cfg-btn" onclick="closeModal()">Close</button>
            <button id="save">Save</button>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
function getSecurePassphraseSession() {
    let activeKey = localStorage.getItem("shared_sync_account_id");
    while (!activeKey || !activeKey.trim()) {
        activeKey = prompt("Enter your personal synchronization Passphrase / Account Key:\n(Use this exact key on your PC and Phone to instantly link histories)");
        if (activeKey) {
            activeKey = activeKey.trim();
            localStorage.setItem("shared_sync_account_id", activeKey);
        }
    }
    return activeKey;
}

const userId = getSecurePassphraseSession();
const socket = io({ auth: { userId } });

let currentChat = null;
let chatData = null;
let activeStreamBodyNode = null;
let activeRawStreamText = "";

const chatDiv = document.getElementById("chat");
const chatList = document.getElementById("chatList");
const input = document.getElementById("message");
const massDeleteBtn = document.getElementById("massDeleteBtn");
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("sidebarOverlay");

marked.setOptions({ breaks: true, gfm: true });

document.getElementById("logoutBtn").onclick = () => {
    if(confirm("Change synchronization passkey account?")) {
        localStorage.removeItem("shared_sync_account_id");
        window.location.reload();
    }
};

function toggleMobileMenu() {
    sidebar.classList.toggle("open");
    overlay.classList.toggle("open");
}
document.getElementById("menuToggle").onclick = toggleMobileMenu;
overlay.onclick = toggleMobileMenu;

function updateDeleteButtonVisibility() {
    const checkedBoxes = document.querySelectorAll(".delete-checkbox:checked");
    massDeleteBtn.style.display = checkedBoxes.length > 0 ? "flex" : "none";
}

massDeleteBtn.onclick = () => {
    const checkedBoxes = document.querySelectorAll(".delete-checkbox:checked");
    const idsToDelete = Array.from(checkedBoxes).map(cb => cb.dataset.id);
    if (confirm(`Delete these ${idsToDelete.length} selected chat histories completely?`)) {
        socket.emit("delete selected chats", idsToDelete);
    }
};

// TRIGGER AN ON-THE-FLY CHAT NAME MODIFICATION ON THE BACKEND SINK ENGINE
function renameChatThread(chatId, oldName) {
    const newName = prompt("Enter a new title name for this chat room:", oldName);
    if (newName && newName.trim() && newName.trim() !== oldName) {
        // Intercepting update structure using character packet architecture payload vectors
        if (chatData && chatData.chatId === chatId) {
            chatData.name = newName.trim();
        }
        // Direct rewrite instruction sent safely to persistence directory layer
        socket.emit("update world", { chatId, worldScenario: chatData ? chatData.worldScenario : "", customName: newName.trim() });
    }
}

function appendMessage(role, content, customNameLabel) {
    const wrapper = document.createElement("div");
    wrapper.className = `message-wrapper ${role}-wrapper`;
    const container = document.createElement("div");
    container.className = "message-container";
    const header = document.createElement("div");
    header.className = "msg-header";
    header.innerText = role === "user" ? "You" : (customNameLabel || "Assistant");
    
    const body = document.createElement("div");
    body.className = "msg-body";
    body.innerHTML = marked.parse(content);

    container.appendChild(header);
    container.appendChild(body);
    wrapper.appendChild(container);
    chatDiv.appendChild(wrapper);
    chatDiv.scrollTop = chatDiv.scrollHeight;
    return body;
}

socket.on("chats list", (chats) => {
    chatList.innerHTML = "";
    chats.forEach(item => {
        const row = document.createElement("div");
        row.className = "chat-item-wrapper";
        row.dataset.id = item.id;
        if(currentChat === item.id) row.classList.add("active");

        const chk = document.createElement("input");
        chk.type = "checkbox";
        chk.className = "delete-checkbox";
        chk.dataset.id = item.id;
        chk.onchange = updateDeleteButtonVisibility;

        const lnk = document.createElement("div");
        lnk.className = "chat-item-link";
        lnk.innerText = item.name;
        lnk.onclick = () => {
            socket.emit("open chat", item.id);
            if (window.innerWidth <= 768) toggleMobileMenu();
        };
        // Setup simple cross-device handler for explicit text thread rewrites
        lnk.ondblclick = (e) => {
            e.stopPropagation();
            renameChatThread(item.id, item.name);
        };

        row.appendChild(chk);
        row.appendChild(lnk);
        chatList.appendChild(row);
    });
    updateDeleteButtonVisibility();
});

socket.on("active chat lock", (chatId) => {
    currentChat = chatId;
    document.querySelectorAll(".chat-item-wrapper").forEach(el => {
        el.classList.toggle("active", el.dataset.id === chatId);
    });
});

socket.on("load chat", (chat) => {
    if (chat.chatId !== currentChat) return;
    chatData = chat;
    chatDiv.innerHTML = "";
    if (chat.messages && chat.messages.length > 0) {
        chat.messages.forEach(m => appendMessage(m.role, m.content, m.displayName));
    } else {
        chatDiv.innerHTML = "<div style='text-align:center;color:var(--text-secondary);padding:40px;font-size:14px;'>Logs cleared. Core context profiles intact.</div>";
    }
    if (modal.style.display === "flex" && modal.dataset.type === "character") renderCharacterList();
});

socket.on("clear display viewport", () => {
    currentChat = null;
    chatData = null;
    chatDiv.innerHTML = "<div style='text-align:center;color:var(--text-secondary);padding:40px;'>No active histories loaded.</div>";
});

function handleSendMessage() {
    const msg = input.value.trim();
    if (!msg || !currentChat) return;
    
    // If layout placeholder was present, clean viewport
    if (chatData && (!chatData.messages || chatData.messages.length === 0)) {
        chatDiv.innerHTML = "";
    }
    
    appendMessage("user", msg);
    socket.emit("chat message", { chatId: currentChat, message: msg });
    input.value = "";
}

document.getElementById("form").onsubmit = (e) => {
    e.preventDefault();
    handleSendMessage();
};

document.getElementById("sendBtn").addEventListener("touchend", (e) => {
    e.preventDefault();
    handleSendMessage();
});

// WIPES CHAT LOGS WHILE SAFEGUARDING STRUCTURAL CONFIGURATIONS
document.getElementById("clearLogsBtn").onclick = () => {
    if (!currentChat || !chatData) return;
    if (confirm("Clear conversation history logs? (Characters and World parameters will stay safe)")) {
        socket.emit("update characters", { chatId: currentChat, characters: chatData.characters || [], clearLogTrack: true });
    }
};
document.getElementById("clearLogsBtn").addEventListener("touchend", (e) => {
    e.preventDefault();
    if (!currentChat || !chatData) return;
    if (confirm("Clear conversation history logs? (Characters and World parameters will stay safe)")) {
        socket.emit("update characters", { chatId: currentChat, characters: chatData.characters || [], clearLogTrack: true });
    }
});

document.getElementById("newChat").onclick = () => {
    socket.emit("new chat");
    if (window.innerWidth <= 768) toggleMobileMenu();
};

socket.on("stream chunk", (data) => {
    if (data.chatId !== currentChat) return;
    if (!activeStreamBodyNode) {
        activeRawStreamText = "";
        activeStreamBodyNode = appendMessage("ai", "", data.identityLabel);
    }
    activeRawStreamText += data.textChunk;
    activeStreamBodyNode.innerHTML = marked.parse(activeRawStreamText);
    chatDiv.scrollTop = chatDiv.scrollHeight;
});

socket.on("stream complete", (data) => {
    if (data.chatId === currentChat) {
        activeStreamBodyNode = null;
        activeRawStreamText = "";
    }
});

const modal = document.getElementById("modal");
const modalText = document.getElementById("modalText");
const modalTitle = document.getElementById("modalTitle");
const charNameInput = document.getElementById("charNameInput");
const textInputLabel = document.getElementById("textInputLabel");
const charInputs = document.getElementById("charInputs");
const charactersZone = document.getElementById("characters-list-zone");
const saveBtn = document.getElementById("save");

function renderCharacterList() {
    charactersZone.innerHTML = "";
    if (!chatData || !chatData.characters) return;
    chatData.characters.forEach((char, idx) => {
        const card = document.createElement("div");
        card.className = "character-card";
        card.innerHTML = `<span><strong>${char.name}</strong></span><button style="background:#cc241d;color:white;border:none;padding:4px 8px;border-radius:4px;cursor:pointer;" onclick="removeChar(${idx})">Delete</button>`;
        charactersZone.appendChild(card);
    });
}

window.removeChar = (index) => {
    const list = [...chatData.characters];
    list.splice(index, 1);
    socket.emit("update characters", { chatId: currentChat, characters: list });
};

function openModal(type) {
    modal.style.display = "flex";
    modal.dataset.type = type;
    if (!chatData) return;
    if (type === "character") {
        modalTitle.innerText = "Manage Chat Personas";
        charactersZone.style.display = "flex";
        charInputs.style.display = "flex";
        textInputLabel.innerText = "System Instructions";
        renderCharacterList();
    } else {
        modalTitle.innerText = "Global Scenario Matrix";
        charactersZone.style.display = "none";
        charInputs.style.display = "none";
        textInputLabel.innerText = "Environment Settings";
        modalText.value = chatData.worldScenario || "";
    }
}

function closeModal() { modal.style.display = "none"; }
document.getElementById("charBtn").onclick = () => openModal("character");
document.getElementById("worldBtn").onclick = () => openModal("world");

saveBtn.onclick = () => {
    const type = modal.dataset.type;
    if (type === "character") {
        const name = charNameInput.value.trim();
        const text = modalText.value.trim();
        if (!name || !text) return;
        socket.emit("update characters", { chatId: currentChat, characters: [...(chatData.characters || []), { name, text, enabled: true }] });
        charNameInput.value = ""; modalText.value = "";
    } else {
        socket.emit("update world", { chatId: currentChat, worldScenario: modalText.value.trim() });
        closeModal();
    }
};
</script>
</body>
</html>
