<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatGPT Style Interface</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
:root {
    --bg-main: #212121;
    --bg-sidebar: #171717;
    --bg-message-user: #2f2f2f;
    --text-primary: #ececec;
    --text-secondary: #b4b4b4;
    --border-color: #424242;
    --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

* { box-sizing: border-box; }

body {
    margin: 0;
    display: flex;
    height: 100vh;
    background: var(--bg-main);
    color: var(--text-primary);
    font-family: var(--font-stack);
    font-size: 16px;
    line-height: 1.6;
}

/* SIDEBAR UI */
#sidebar {
    width: 260px;
    background: var(--bg-sidebar);
    display: flex;
    flex-direction: column;
    padding: 12px;
    z-index: 10;
}

.sidebar-actions-row {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
}

#newChat {
    flex: 1;
    padding: 10px 12px;
    background: transparent;
    border: 1px solid var(--border-color);
    border-radius: 8px;
    color: var(--text-primary);
    text-align: left;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.2s;
    display: flex;
    align-items: center;
    justify-content: space-between;
}
#newChat:hover { background: rgba(255, 255, 255, 0.05); }

#clearChat {
    background: transparent;
    border: 1px solid #cc241d;
    color: #ff6b6b;
    border-radius: 8px;
    padding: 0 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
}
#clearChat:hover { background: rgba(204, 36, 29, 0.15); }

#chatList {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 4px;
}

.chat-item {
    padding: 10px 12px;
    cursor: pointer;
    border-radius: 6px;
    font-size: 14px;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: background 0.15s ease;
}
.chat-item:hover, .chat-item.active { background: #212121; }

/* MAIN CONTENT CONTAINER */
#main {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100%;
    position: relative;
}

#topbar {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    padding: 14px 20px;
    background: var(--bg-main);
}

#topbar button {
    background: transparent;
    border: 1px solid var(--border-color);
    color: var(--text-secondary);
    padding: 6px 12px;
    border-radius: 16px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
}
#topbar button:hover {
    border-color: #666;
    color: var(--text-primary);
}

/* THREAD CONTEXT WINDOW */
#chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px 0;
    display: flex;
    flex-direction: column;
}

.message-wrapper {
    width: 100%;
    display: flex;
    padding: 14px 24px;
    justify-content: center;
}

.message-container {
    width: 100%;
    max-width: 720px;
    display: flex;
    flex-direction: column;
}

.msg-header {
    font-weight: 600;
    font-size: 14px;
    margin-bottom: 4px;
}

.user-wrapper .msg-header { align-self: flex-end; color: var(--text-primary); }
.ai-wrapper .msg-header { color: #10a37f; text-transform: capitalize; }
.msg-body { font-size: 16px; word-break: break-word; }

.msg-body p { margin: 0 0 10px 0; }
.msg-body p:last-child { margin-bottom: 0; }
.msg-body ul, .msg-body ol { margin: 0 0 10px 0; padding-left: 24px; }
.msg-body h1, .msg-body h2, .msg-body h3 { margin: 14px 0 8px 0; font-size: 1.2em; }

.msg-body code {
    background: #2d2d2d;
    padding: 2px 6px;
    border-radius: 4px;
    font-family: 'Courier New', Courier, monospace;
    font-size: 14px;
}

.msg-body pre {
    background: #0d0d0d;
    padding: 16px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 12px 0;
}
.msg-body pre code { background: transparent; padding: 0; font-size: 14px; color: #e6e6e6; display: block; }

.user-wrapper { justify-content: flex-end; }
.user-wrapper .message-container { align-items: flex-end; }
.user-wrapper .msg-body {
    background-color: var(--bg-message-user);
    padding: 10px 16px;
    border-radius: 20px;
    max-width: 80%;
}
.ai-wrapper .msg-body { padding: 4px 0; color: var(--text-primary); }

/* INPUT COMPONENT AREA BOX */
#input-area {
    width: 100%;
    display: flex;
    justify-content: center;
    padding: 0 24px 24px 24px;
    background: var(--bg-main);
}

#form {
    width: 100%;
    max-width: 720px;
    position: relative;
    background: var(--bg-message-user);
    border-radius: 24px;
    display: flex;
    align-items: center;
    padding: 6px 12px;
}

#message {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text-primary);
    font-family: var(--font-stack);
    font-size: 16px;
    padding: 10px 40px 10px 10px;
}
#message::placeholder { color: var(--text-secondary); }

#form button {
    position: absolute;
    right: 12px;
    background: var(--text-primary);
    border: none;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: opacity 0.2s;
}
#form button:hover { opacity: 0.85; }
#form button svg { fill: var(--bg-sidebar); }

/* POPUPS MODAL CONFIG SYSTEM */
#modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(4px);
    z-index: 100;
    align-items: center;
    justify-content: center;
}

#modalContent {
    background: #2f2f2f;
    width: 90%;
    max-width: 550px;
    border-radius: 12px;
    padding: 24px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    display: flex;
    flex-direction: column;
    max-height: 85vh;
}

#modalTitle { margin-top: 0; font-size: 18px; font-weight: 600; margin-bottom: 16px; }

#characters-list-zone {
    flex: 1;
    overflow-y: auto;
    margin-bottom: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding-right: 4px;
}

.character-card {
    background: var(--bg-main);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    padding: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
}

.character-checkbox {
    width: 18px;
    height: 18px;
    accent-color: #10a37f;
    cursor: pointer;
}

.character-card .char-name {
    font-size: 15px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
}
.character-card.disabled .char-name {
    color: var(--text-secondary);
    text-decoration: line-through;
    opacity: 0.6;
}

.btn-delete-char {
    background: #cc241d !important;
    color: white !important;
    border: none;
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px !important;
}

.input-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 12px;
}
.input-group label {
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 500;
}

.char-input-name {
    width: 100%;
    background: var(--bg-main);
    color: var(--text-primary);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    padding: 10px;
    font-family: var(--font-stack);
    font-size: 14px;
    outline: none;
}
.char-input-name:focus { border-color: #666; }

textarea {
    width: 100%;
    height: 100px;
    background: var(--bg-main);
    color: var(--text-primary);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    padding: 12px;
    font-family: var(--font-stack);
    font-size: 14px;
    resize: none;
    outline: none;
}
textarea:focus { border-color: #666; }

.modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    padding-top: 14px;
    border-top: 1px solid var(--border-color);
    margin-top: 6px;
}

.modal-actions button {
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
    font-weight: 500;
    border: none;
}

#save { background: #10a37f; color: white; }
.btn-cancel { background: transparent; color: var(--text-secondary); border: 1px solid var(--border-color) !important; }
.btn-cancel:hover { color: var(--text-primary); }
</style>
</head>

<body>

<div id="sidebar">
    <div class="sidebar-actions-row">
        <button id="newChat">
            <span>New chat</span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        </button>
        <button id="clearChat" title="Clear this chat history thread">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
        </button>
    </div>
    <div id="chatList"></div>
</div>

<div id="main">
    <div id="topbar">
        <button id="charBtn">Manage Characters</button>
        <button id="worldBtn">World Context</button>
    </div>

    <div id="chat"></div>

    <div id="input-area">
        <form id="form">
            <input id="message" autocomplete="off" placeholder="Message Grok..." />
            <button type="submit">
                <svg width="16" height="16" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </form>
    </div>
</div>

<div id="modal">
    <div id="modalContent">
        <h3 id="modalTitle">Configuration</h3>
        
        <div id="characters-list-zone"></div>
        
        <div id="character-inputs-wrapper">
            <div class="input-group">
                <label for="charNameInput">Character Name</label>
                <input type="text" id="charNameInput" class="char-input-name" placeholder="E.g., Sherlock Holmes, Yoda..." />
            </div>
        </div>

        <div class="input-group">
            <label id="textInputLabel" for="modalText">Instructions / Context</label>
            <textarea id="modalText"></textarea>
        </div>

        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal()">Close</button>
            <button id="save">Save Changes</button>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
function getUserId() {
    let id = localStorage.getItem("userId");
    if (!id) {
        id = crypto.randomUUID();
        localStorage.setItem("userId", id);
    }
    return id;
}

const socket = io({ auth: { userId: getUserId() } });

let currentChat = null;
let chatData = null;

// Tracking variable components for stream token assembly
let activeStreamBodyNode = null;
let activeRawStreamText = "";

const chatDiv = document.getElementById("chat");
const chatList = document.getElementById("chatList");
const input = document.getElementById("message");

marked.setOptions({ breaks: true, gfm: true });

function appendMessage(role, content, customNameLabel) {
    const wrapper = document.createElement("div");
    wrapper.className = `message-wrapper ${role}-wrapper`;

    const container = document.createElement("div");
    container.className = "message-container";

    const header = document.createElement("div");
    header.className = "msg-header";
    
    if (role === "user") {
        header.innerText = "You";
    } else {
        header.innerText = customNameLabel || "Assistant";
    }

    const body = document.createElement("div");
    body.className = "msg-body";
    body.innerHTML = marked.parse(content);

    container.appendChild(header);
    container.appendChild(body);
    wrapper.appendChild(container);
    chatDiv.appendChild(wrapper);
    
    chatDiv.scrollTop = chatDiv.scrollHeight;
    
    return body; // Return body reference for streaming writes
}

/* CHATS LIST SYNC */
socket.on("chats list", (chats) => {
    chatList.innerHTML = "";
    chats.forEach(item => {
        const div = document.createElement("div");
        div.className = "chat-item";
        if(currentChat === item.id) div.className += " active";
        div.innerText = item.name;
        div.onclick = () => {
            document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
            div.classList.add('active');
            socket.emit("open chat", item.id);
        };
        chatList.appendChild(div);
    });
});

/* CHAT LOAD WITH CUSTOMIZED NAME HOOKS */
socket.on("load chat", (chat) => {
    chatData = chat;
    currentChat = chat.chatId;
    localStorage.setItem("lastChat", currentChat);

    chatDiv.innerHTML = "";
    chat.messages.forEach(m => {
        appendMessage(m.role, m.content, m.displayName);
    });

    if (modal.style.display === "flex" && modal.dataset.type === "character") {
        renderCharacterList();
    }
});

document.getElementById("newChat").onclick = () => {
    socket.emit("new chat");
};

/* CHAT CLEAR TRIGGER BUTTON */
document.getElementById("clearChat").onclick = () => {
    if (!currentChat) return;
    if (confirm("Are you sure you want to clear all message logs in this chat session?")) {
        socket.emit("clear chat", currentChat);
    }
};

document.getElementById("form").onsubmit = (e) => {
    e.preventDefault();
    const msg = input.value.trim();

    if (!msg) return;
    if (!currentChat) {
        alert("Please select or start a chat thread first.");
        return;
    }

    appendMessage("user", msg);
    socket.emit("chat message", { chatId: currentChat, message: msg });
    input.value = "";
};

/* INTERACTIVE STREAM CHUNK CAPTURE ENGINE */
socket.on("stream chunk", (data) => {
    if (data.chatId !== currentChat) return;

    // Check if we need to initialize a fresh chunk display node block
    if (!activeStreamBodyNode) {
        activeRawStreamText = "";
        activeStreamBodyNode = appendMessage("ai", "", data.identityLabel);
    }

    activeRawStreamText += data.textChunk;
    activeStreamBodyNode.innerHTML = marked.parse(activeRawStreamText);
    chatDiv.scrollTop = chatDiv.scrollHeight;
});

socket.on("stream complete", (data) => {
    if (data.chatId === currentChat) {
        activeStreamBodyNode = null;
        activeRawStreamText = "";
    }
});

socket.on("chat response", (data) => {
    if(data.chatId === currentChat) {
        appendMessage("ai", data.message);
    }
});

/* MODAL PRESETS DIALOG CONTROLS */
const modal = document.getElementById("modal");
const modalText = document.getElementById("modalText");
const modalTitle = document.getElementById("modalTitle");
const charNameInput = document.getElementById("charNameInput");
const textInputLabel = document.getElementById("textInputLabel");
const charInputsWrapper = document.getElementById("character-inputs-wrapper");
const charactersZone = document.getElementById("characters-list-zone");
const saveBtn = document.getElementById("save");

function renderCharacterList() {
    charactersZone.innerHTML = "";
    if (!chatData || !chatData.characters) return;

    chatData.characters.forEach((char, index) => {
        const card = document.createElement("div");
        card.className = "character-card" + (char.enabled ? "" : " disabled");

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.className = "character-checkbox";
        checkbox.checked = char.enabled;
        
        checkbox.onchange = () => {
            const updatedList = [...chatData.characters];
            updatedList[index].enabled = checkbox.checked;
            socket.emit("update characters", {
                chatId: currentChat,
                characters: updatedList
            });
        };

        const nameSpan = document.createElement("span");
        nameSpan.className = "char-name";
        nameSpan.innerText = char.name;

        const delBtn = document.createElement("button");
        delBtn.className = "btn-delete-char";
        delBtn.innerText = "Delete";
        delBtn.onclick = () => {
            const updatedList = [...chatData.characters];
            updatedList.splice(index, 1);
            socket.emit("update characters", {
                chatId: currentChat,
                characters: updatedList
            });
        };

        card.appendChild(checkbox);
        card.appendChild(nameSpan);
        card.appendChild(delBtn);
        charactersZone.appendChild(card);
    });
}

function openModal(type) {
    modal.style.display = "flex";
    modal.dataset.type = type;
    modalText.value = "";
    charNameInput.value = "";

    if (!chatData) return;

    if (type === "character") {
        modalTitle.innerText = "Manage Chat Characters";
        charactersZone.style.display = "flex";
        charInputsWrapper.style.display = "block";
        textInputLabel.innerText = "System Instructions / Persona Prompts";
        modalText.placeholder = "Paste your long persona setup parameters, character background context, or instructions here...";
        saveBtn.innerText = "Add Character";
        renderCharacterList();
    }
    if (type === "world") {
        modalTitle.innerText = "World Scenario Parameters";
        charactersZone.style.display = "none";
        charInputsWrapper.style.display = "none";
        textInputLabel.innerText = "Environment Settings";
        modalText.placeholder = "Set the environment scene rules or universal global behaviors...";
        modalText.value = chatData.worldScenario || "";
        saveBtn.innerText = "Save World Context";
    }
}

function closeModal() {
    modal.style.display = "none";
}

document.getElementById("charBtn").onclick = () => openModal("character");
document.getElementById("worldBtn").onclick = () => openModal("world");

document.getElementById("save").onclick = () => {
    const type = modal.dataset.type;
    if (!currentChat) return;

    if (type === "character") {
        const nameVal = charNameInput.value.trim();
        const textVal = modalText.value.trim();
        
        if (!nameVal || !textVal) {
            alert("Both Character Name and System Instructions are required.");
            return;
        }
        
        const currentList = chatData.characters || [];
        socket.emit("update characters", {
            chatId: currentChat,
            characters: [...currentList, { name: nameVal, text: textVal, enabled: true }]
        });
        
        charNameInput.value = "";
        modalText.value = "";
    }
    if (type === "world") {
        socket.emit("update world", {
            chatId: currentChat,
            worldScenario: modalText.value
        });
        closeModal();
    }
};
</script>
</body>
</html>
