<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Synchronized Interface Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root {
    --bg-main: #212121;
    --bg-sidebar: #171717;
    --bg-message-user: #2f2f2f;
    --text-primary: #ececec;
    --text-secondary: #b4b4b4;
    --border-color: #424242;
    --accent: #10a37f;
    --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

* { box-sizing: border-box; }
body {
    margin: 0; display: flex; position: absolute; top: 0; bottom: 0; left: 0; right: 0;
    background: var(--bg-main); color: var(--text-primary); font-family: var(--font-stack); overflow: hidden;
}

/* SIDEBAR */
#sidebar {
    width: 280px; background: var(--bg-sidebar); display: flex; flex-direction: column; padding: 12px;
    border-right: 1px solid var(--border-color); transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000;
}
.sidebar-header-actions { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }
#newChat { flex: 1; padding: 12px; background: transparent; border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-primary); cursor: pointer; display: flex; align-items: center; justify-content: space-between; }

/* SELECTION MANAGEMENT BAR */
#selectionActionBar { display: none; gap: 6px; }
.action-bar-btn { background: transparent; border: 1px solid var(--border-color); border-radius: 8px; height: 43px; padding: 0 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
#massDeleteBtn { border-color: #cc241d; color: #ff6b6b; }
#massRenameBtn { border-color: var(--accent); color: var(--accent); }

#chatList { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
.chat-item-wrapper { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 8px; transition: all 0.2s ease; border: 1px solid transparent; }

.chat-item-wrapper.active { 
    background: rgba(16, 163, 127, 0.15) !important; 
    border-color: var(--accent) !important; 
}
.chat-item-wrapper.active .chat-item-link {
    color: white !important;
    font-weight: 500;
}

.delete-checkbox { width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer; flex-shrink: 0; }
.chat-item-link { flex: 1; cursor: pointer; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-primary); padding: 2px 0; }

/* OPEN ACTIVE CHAT BADGE */
.active-badge { font-size: 10px; color: var(--accent); background: rgba(16, 163, 127, 0.25); padding: 2px 6px; border-radius: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.active-badge::before { content: "●"; font-size: 8px; color: var(--accent); }

/* MAIN CONTAINER Layout */
#main { flex: 1; display: flex; flex-direction: column; height: 100%; position: relative; min-width: 0; }
#topbar { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; background: var(--bg-main); border-bottom: 1px solid var(--border-color); flex-shrink: 0; }
.nav-toggle-btn { display: none; background: transparent; border: 1px solid var(--border-color); color: var(--text-primary); padding: 8px; border-radius: 6px; cursor: pointer; }
.topbar-controls { display: flex; gap: 8px; }
.cfg-btn { background: transparent; border: 1px solid var(--border-color); color: var(--text-secondary); padding: 8px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; }

#chat { flex: 1; overflow-y: auto; padding: 12px 0; min-height: 0; scroll-behavior: smooth; }
.message-wrapper { width: 100%; display: flex; padding: 12px 16px; justify-content: center; }
.message-container { width: 100%; max-width: 720px; }
.msg-header { font-weight: 600; font-size: 13px; margin-bottom: 4px; }
.user-wrapper { justify-content: flex-end; }
.user-wrapper .message-container { display: flex; flex-direction: column; align-items: flex-end; }

/* REIFIED FORMATTING ENGINE BASE RULES FOR BOTH USER & AI */
.msg-body { font-size: 15px; word-break: break-word; line-height: 1.5; }
.msg-body p { margin: 0 0 10px 0; }
.msg-body p:last-child { margin-bottom: 0; }
.msg-body pre { background: #0d0d0d; padding: 12px; border-radius: 8px; overflow-x: auto; margin: 8px 0; }
.msg-body code { font-family: monospace; background: rgba(0,0,0,0.3); padding: 2px 5px; border-radius: 4px; font-size: 14px; }
.msg-body pre code { background: transparent; padding: 0; border-radius: 0; font-size: 13px; }
.msg-body ul, .msg-body ol { margin: 0 0 10px 0; padding-left: 20px; }

/* INDEPENDENT SKIN COLORING RULES */
.user-wrapper .msg-body { background: var(--bg-message-user); padding: 12px 16px; border-radius: 18px; max-width: 85%; }
.ai-wrapper .msg-header { color: var(--accent); }

#input-area { padding: 12px 16px; background: var(--bg-main); flex-shrink: 0; z-index: 10; }
.input-container-wrapper { display: flex; width: 100%; max-width: 720px; margin: 0 auto; gap: 8px; align-items: flex-end; }
#form { flex: 1; position: relative; background: var(--bg-message-user); border-radius: 24px; display: flex; padding: 4px 8px; align-items: flex-end; }

#message { flex: 1; background: transparent; border: none; outline: none; color: var(--text-primary); padding: 12px; font-size: 16px; font-family: inherit; resize: none; max-height: 200px; height: 44px; overflow-y: hidden; }

#form button { background: var(--text-primary); border: none; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-bottom: 4px; }
.clear-logs-btn { background: transparent; border: 1px solid var(--border-color); color: #ff6b6b; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

#sidebarOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 999; }

/* MODALS */
#modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 10000; align-items: center; justify-content: center; }
#modalContent { background: #2f2f2f; width: 92%; max-width: 600px; border-radius: 12px; padding: 20px; display: flex; flex-direction: column; max-height: 85vh; }
#item-list-zone { overflow-y: auto; margin-bottom: 12px; display: flex; flex-direction: column; gap: 10px; }

/* ITEM CARDS */
.item-card { background: var(--bg-main); border-radius: 8px; padding: 12px; border: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 8px; }
.item-header { display: flex; align-items: center; gap: 10px; }
.item-name { font-weight: bold; cursor: pointer; flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 14px; }
.item-name:focus { border-bottom: 1px solid var(--accent); }
.item-body { font-size: 13px; color: var(--text-secondary); white-space: pre-wrap; cursor: pointer; min-height: 20px; }
.item-checkbox { width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer; }
.btn-del { background: #cc241d; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; }

.fold-toggle-btn { background: transparent; border: none; color: var(--text-secondary); cursor: pointer; font-size: 12px; padding: 4px; display: flex; align-items: center; justify-content: center; transition: color 0.2s; }
.fold-toggle-btn:hover { color: white; }

/* CHARACTER AVATAR THUMBNAILS */
.item-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; background: #444; border: 1px solid var(--border-color); flex-shrink: 0; cursor: pointer; transition: transform 0.2s ease; }
.item-avatar:hover { transform: scale(1.08); }
.avatar-placeholder { width: 36px; height: 36px; border-radius: 50%; background: #444; display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--text-secondary); flex-shrink: 0; }

/* LIGHTBOX FOR BIG IMAGE VIEW */
#lightbox { display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85); z-index: 20000; align-items: center; justify-content: center; cursor: zoom-out; opacity: 0; transition: opacity 0.2s ease-in-out; }
#lightbox.show { display: flex; opacity: 1; }
#lightboxImg { max-width: 90%; max-height: 90%; border-radius: 8px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); transform: scale(0.95); transition: transform 0.2s ease-in-out; cursor: default; }
#lightbox.show #lightboxImg { transform: scale(1); }

/* EDIT FIELD */
.auto-edit-field { width: 100%; background: #111; border: 1px solid var(--accent); color: white; padding: 10px; border-radius: 6px; font-family: inherit; font-size: 13px; resize: none; overflow: hidden; outline: none; }

.input-group { display: flex; flex-direction: column; gap: 5px; margin-top: 10px; border-top: 1px solid #444; padding-top: 10px; }
.input-group label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
.input-group input, .input-group textarea { background: var(--bg-main); border: 1px solid var(--border-color); color: var(--text-primary); padding: 10px; border-radius: 6px; outline: none; font-family: inherit; }
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 15px; flex-shrink: 0; }
#save { background: var(--accent); color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }

@media (max-width: 768px) {
    #sidebar { position: fixed; left: 0; top: 0; bottom: 0; transform: translateX(-100%); }
    #sidebar.open { transform: translateX(0); }
    .nav-toggle-btn { display: block; }
    #sidebarOverlay.open { display: block; }
    #topbar { padding: 8px; gap: 4px; }
    #topbar button.cfg-btn { padding: 6px 8px; font-size: 11px; }
    #main { height: 100vh; height: -webkit-fill-available; }
}
</style>
</head>
<body>

<div id="sidebarOverlay"></div>
<div id="sidebar">
    <div class="sidebar-header-actions">
        <button id="newChat"><span>New Chat</span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg></button>
        <div id="selectionActionBar">
            <button id="massRenameBtn" class="action-bar-btn" title="Rename Selected"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg></button>
            <button id="massDeleteBtn" class="action-bar-btn" title="Delete Selected"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>
        </div>
    </div>
    <div id="chatList"></div>
</div>

<div id="main">
    <div id="topbar">
        <button class="nav-toggle-btn" id="menuToggle"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></button>
        <div class="topbar-controls">
            <button class="cfg-btn" id="charBtn">Characters</button>
            <button class="cfg-btn" id="worldBtn">Scenarios</button>
            <button class="cfg-btn" id="extraInfoBtn" style="border-color: #555;">Extra Info</button>
            <button class="cfg-btn" id="logoutBtn" style="border-color:#cc241d;color:#ff6b6b;">Sync Key</button>
        </div>
    </div>
    <div id="chat"></div>
    <div id="input-area">
        <div class="input-container-wrapper">
            <button id="clearLogsBtn" class="clear-logs-btn" title="Clear Logs"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"></path><path d="m8 11 4 4 4-4"></path></svg></button>
            <form id="form">
                <textarea id="message" rows="1" autocomplete="off" placeholder="Send message..."></textarea>
                <button id="sendBtn" type="submit"><svg width="16" height="16" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
            </form>
        </div>
    </div>
</div>

<div id="modal">
    <div id="modalContent">
        <h3 id="modalTitle">Setup</h3>
        <div id="item-list-zone"></div>
        <div id="new-item-inputs" class="input-group">
            <label id="nameLabel">Name</label><input type="text" id="newNameInput" />
            <div id="avatarUploadContainer" style="display:flex; flex-direction:column; gap:4px; margin-bottom:8px;">
                <label>Avatar Picture</label>
                <input type="file" id="newAvatarInput" accept="image/*" style="font-size:12px;" />
            </div>
            <label id="textLabel">Instructions</label><textarea id="newTextInput" rows="2"></textarea>
        </div>
        <div class="modal-actions"><button class="cfg-btn" onclick="closeModal()">Close</button><button id="save">Add New</button></div>
    </div>
</div>

<div id="lightbox"><img id="lightboxImg" src="" alt="Avatar View" /></div>

<script src="/socket.io/socket.io.js"></script>
<script>
function getSyncKey() {
    let key = localStorage.getItem("sync_key");
    while (!key) {
        key = prompt("Enter your Session Key for sync:");
        if (key) localStorage.setItem("sync_key", key);
    }
    return key;
}

const socket = io({ auth: { userId: getSyncKey() } });
let currentChat = null, chatData = null, activeStreamNode = null, activeStreamText = "";
let selectedChatsTrack = new Set();

const chatDiv = document.getElementById("chat");
marked.setOptions({ breaks: true, gfm: true });

function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = el.scrollHeight + 'px';
}

const mainMessageInput = document.getElementById("message");
mainMessageInput.addEventListener("input", function() {
    this.style.height = '44px';
    if(this.scrollHeight > 44) {
        this.style.height = this.scrollHeight + 'px';
        this.style.overflowY = this.scrollHeight > 200 ? 'auto' : 'hidden';
    } else {
        this.style.overflowY = 'hidden';
    }
});

mainMessageInput.addEventListener("keydown", function(e) {
    if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        document.getElementById("form").requestSubmit();
    }
});

function closeModal() { document.getElementById("modal").style.display = "none"; }

function closeMobileSidebar() {
    document.getElementById("sidebar").classList.remove("open");
    document.getElementById("sidebarOverlay").classList.remove("open");
}

function openLightbox(src) {
    const lb = document.getElementById("lightbox");
    const lbImg = document.getElementById("lightboxImg");
    lbImg.src = src;
    lb.classList.add("show");
}
document.getElementById("lightbox").onclick = function() { this.classList.remove("show"); };
document.getElementById("lightboxImg").onclick = function(e) { e.stopPropagation(); };

function compressAvatarFile(file, callback) {
    const reader = new FileReader();
    reader.onload = function(event) {
        const img = new Image();
        img.onload = function() {
            const canvas = document.createElement("canvas");
            canvas.width = 80;
            canvas.height = 80;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, 80, 80);
            callback(canvas.toDataURL("image/jpeg", 0.7));
        };
        img.src = event.target.result;
    };
    reader.readAsDataURL(file);
}

function renderItemList() {
    if (document.activeElement && document.activeElement.id === "extraInfoTextArea") {
        return;
    }

    const zone = document.getElementById("item-list-zone");
    zone.innerHTML = "";
    if (!chatData) return;
    
    const type = document.getElementById("modal").dataset.type;

    if (type === "extrainfo") {
        const infoWrapper = document.createElement("div");
        infoWrapper.style.display = "flex";
        infoWrapper.style.flexDirection = "column";
        infoWrapper.style.gap = "8px";

        const label = document.createElement("label");
        label.innerText = "Inject Extra Variable Context Knowledge:";
        label.style.fontSize = "12px";
        label.style.color = "var(--text-secondary)";

        const txt = document.createElement("textarea");
        txt.id = "extraInfoTextArea";
        txt.className = "auto-edit-field";
        txt.style.minHeight = "180px";
        txt.value = chatData.extraInfo || "";
        txt.placeholder = "Enter facts, rules, constraints or lore updates here for the AI to instantly remember...";
        
        txt.oninput = () => { chatData.extraInfo = txt.value; };
        txt.onblur = () => { socket.emit("update extra info", { chatId: currentChat, extraInfo: txt.value }); };

        infoWrapper.append(label, txt);
        zone.appendChild(infoWrapper);
        return;
    }

    const items = type === "character" ? (chatData.characters || []) : (chatData.scenarios || []);

    items.forEach((item, idx) => {
        const card = document.createElement("div");
        card.className = "item-card";
        
        const header = document.createElement("div");
        header.className = "item-header";
        
        const check = document.createElement("input");
        check.type = type === "character" ? "checkbox" : "radio";
        if (type === "world") check.name = "scenario-select";
        check.className = "item-checkbox";
        check.checked = type === "character" ? item.enabled : item.active;
        check.onchange = () => {
            if (type === "character") {
                item.enabled = check.checked;
                socket.emit("update characters", { chatId: currentChat, characters: items });
            } else {
                items.forEach((s, i) => s.active = (i === idx));
                socket.emit("update world", { chatId: currentChat, scenarios: items });
            }
        };

        header.appendChild(check);

        let foldBtn = null;
        if (type === "character") {
            foldBtn = document.createElement("button");
            foldBtn.className = "fold-toggle-btn";
            foldBtn.innerHTML = "&#x25B8;"; 
            header.appendChild(foldBtn);
        }

        if (type === "character") {
            if (item.avatar) {
                const img = document.createElement("img");
                img.className = "item-avatar";
                img.src = item.avatar;
                img.onclick = (e) => { e.stopPropagation(); openLightbox(item.avatar); };
                header.appendChild(img);
            } else {
                const placeholder = document.createElement("div");
                placeholder.className = "avatar-placeholder";
                placeholder.innerText = item.name ? item.name.charAt(0).toUpperCase() : "?";
                header.appendChild(placeholder);
            }
        }

        const nameInput = document.createElement("input");
        nameInput.className = "item-name";
        nameInput.value = item.name || "";
        nameInput.placeholder = type === "character" ? "Character Name" : "Scenario Title";
        nameInput.onchange = () => {
            item.name = nameInput.value;
            if (type === "character") {
                socket.emit("update characters", { chatId: currentChat, characters: items });
            } else {
                socket.emit("update world", { chatId: currentChat, scenarios: items });
            }
        };
        header.appendChild(nameInput);

        const delBtn = document.createElement("button");
        delBtn.className = "btn-del";
        delBtn.innerText = "Delete";
        delBtn.onclick = () => {
            items.splice(idx, 1);
            if (type === "character") {
                socket.emit("update characters", { chatId: currentChat, characters: items });
            } else {
                socket.emit("update world", { chatId: currentChat, scenarios: items });
            }
            renderItemList();
        };
        header.appendChild(delBtn);
        card.appendChild(header);

        const bodyArea = document.createElement("div");
        bodyArea.className = "item-body";
        bodyArea.innerText = item.text || (type === "character" ? "Click to add instructions..." : "Click to add world setting description...");
        
        if (type === "character") {
            bodyArea.style.display = "none";
            foldBtn.onclick = (e) => {
                e.stopPropagation();
                if (bodyArea.style.display === "none") {
                    bodyArea.style.display = "block";
                    foldBtn.innerHTML = "&#x25BE;";
                } else {
                    bodyArea.style.display = "none";
                    foldBtn.innerHTML = "&#x25B8;";
                }
            };
        }

        bodyArea.onclick = () => {
            const edit = document.createElement("textarea");
            edit.className = "auto-edit-field";
            edit.value = item.text || "";
            card.replaceChild(edit, bodyArea);
            autoResize(edit);
            edit.focus();
            
            edit.oninput = () => autoResize(edit);
            edit.onblur = () => {
                item.text = edit.value;
                if (type === "character") {
                    socket.emit("update characters", { chatId: currentChat, characters: items });
                } else {
                    socket.emit("update world", { chatId: currentChat, scenarios: items });
                }
                renderItemList();
            };
        };

        card.appendChild(bodyArea);
        zone.appendChild(card);
    });
}

function showModal(title, type) {
    const modal = document.getElementById("modal");
    modal.dataset.type = type;
    document.getElementById("modalTitle").innerText = title;
    
    document.getElementById("newNameInput").value = "";
    document.getElementById("newTextInput").value = "";
    document.getElementById("newAvatarInput").value = "";
    
    const avatarRow = document.getElementById("avatarUploadContainer");
    avatarRow.style.display = type === "character" ? "flex" : "none";
    
    document.getElementById("new-item-inputs").style.display = type === "extrainfo" ? "none" : "flex";
    
    renderItemList();
    modal.style.display = "flex";
}

document.getElementById("charBtn").onclick = () => showModal("Manage System Characters", "character");
document.getElementById("worldBtn").onclick = () => showModal("Manage Narrative Scenarios", "world");
document.getElementById("extraInfoBtn").onclick = () => showModal("Global Fact Injection", "extrainfo");

document.getElementById("save").onclick = () => {
    const type = document.getElementById("modal").dataset.type;
    if (type === "extrainfo") return;

    const name = document.getElementById("newNameInput").value.trim();
    const text = document.getElementById("newTextInput").value.trim();
    if (!name) return;

    const items = type === "character" ? (chatData.characters || []) : (chatData.scenarios || []);

    if (type === "character") {
        const fileInput = document.getElementById("newAvatarInput");
        if (fileInput.files && fileInput.files[0]) {
            compressAvatarFile(fileInput.files[0], (compressedBase64) => {
                items.push({ name, text, enabled: true, avatar: compressedBase64 });
                socket.emit("update characters", { chatId: currentChat, characters: items });
                document.getElementById("newNameInput").value = "";
                document.getElementById("newTextInput").value = "";
                document.getElementById("newAvatarInput").value = "";
                renderItemList();
            });
        } else {
            items.push({ name, text, enabled: true, avatar: null });
            socket.emit("update characters", { chatId: currentChat, characters: items });
            document.getElementById("newNameInput").value = "";
            document.getElementById("newTextInput").value = "";
            renderItemList();
        }
    } else {
        const wasEmpty = items.length === 0;
        items.push({ name, text, active: wasEmpty });
        socket.emit("update world", { chatId: currentChat, scenarios: items });
        document.getElementById("newNameInput").value = "";
        document.getElementById("newTextInput").value = "";
        renderItemList();
    }
};

// BOTH CHAT TILES RENDER VIA THE MARKED MD PARSER INSTANCE
function appendMessage(msg) {
    const isUser = msg.role === "user";
    const wrapper = document.createElement("div");
    wrapper.className = `message-wrapper ${isUser ? 'user-wrapper' : 'ai-wrapper'}`;

    const container = document.createElement("div");
    container.className = "message-container";

    const header = document.createElement("div");
    header.className = "msg-header";
    header.innerText = isUser ? "You" : (msg.displayName || "Assistant");

    const body = document.createElement("div");
    body.className = "msg-body";
    
    // Marked parsing pipeline applies universally to user formatting blueprints as well
    body.innerHTML = marked.parse(msg.content);

    container.append(header, body);
    wrapper.appendChild(container);
    chatDiv.appendChild(wrapper);
    chatDiv.scrollTop = chatDiv.scrollHeight;
    return body;
}

function renderChat() {
    chatDiv.innerHTML = "";
    if (!chatData || !chatData.messages) return;
    chatData.messages.forEach(appendMessage);
    chatDiv.scrollTop = chatDiv.scrollHeight;
}

function updateActionBarVisibility() {
    const bar = document.getElementById("selectionActionBar");
    const newChatBtn = document.getElementById("newChat");
    if (selectedChatsTrack.size > 0) {
        bar.style.display = "flex";
        newChatBtn.style.display = "none";
    } else {
        bar.style.display = "none";
        newChatBtn.style.display = "flex";
    }
}

// SOCKET EVENTS
socket.on("chats list", (chats) => {
    const list = document.getElementById("chatList");
    list.innerHTML = "";
    chats.forEach(c => {
        const wrap = document.createElement("div");
        wrap.className = `chat-item-wrapper ${c.id === currentChat ? 'active' : ''}`;
        
        const check = document.createElement("input");
        check.type = "checkbox";
        check.className = "delete-checkbox";
        check.checked = selectedChatsTrack.has(c.id);
        check.onclick = (e) => e.stopPropagation(); 
        check.onchange = () => {
            if (check.checked) {
                selectedChatsTrack.add(c.id);
            } else {
                selectedChatsTrack.delete(c.id);
            }
            updateActionBarVisibility();
        };
        wrap.appendChild(check);

        const link = document.createElement("div");
        link.className = "chat-item-link";
        link.innerText = c.name || "Untitled Chat";
        link.onclick = () => {
            currentChat = c.id;
            socket.emit("open chat", c.id);
            closeMobileSidebar();
        };
        wrap.appendChild(link);

        if (c.id === currentChat) {
            const badge = document.createElement("span");
            badge.className = "active-badge";
            badge.innerText = "Live";
            wrap.appendChild(badge);
        }
        list.appendChild(wrap);
    });
    updateActionBarVisibility();
});

socket.on("active chat lock", (id) => { currentChat = id; });

socket.on("load chat", (data) => {
    if (data.chatId && data.chatId !== currentChat) return;
    chatData = data;
    renderChat();
    renderItemList();
});

socket.on("stream chunk", (data) => {
    if (data.chatId !== currentChat) return;
    if (!activeStreamNode) {
        const wrapper = document.createElement("div");
        wrapper.className = "message-wrapper ai-wrapper";
        const container = document.createElement("div");
        container.className = "message-container";
        const header = document.createElement("div");
        header.className = "msg-header";
        header.innerText = data.identityLabel || "Assistant";
        activeStreamNode = document.createElement("div");
        activeStreamNode.className = "msg-body";
        
        container.append(header, activeStreamNode);
        wrapper.appendChild(container);
        chatDiv.appendChild(wrapper);
    }
    activeStreamText += data.textChunk;
    activeStreamNode.innerHTML = marked.parse(activeStreamText);
    chatDiv.scrollTop = chatDiv.scrollHeight;
});

socket.on("stream complete", (data) => {
    if (data.chatId !== currentChat) return;
    activeStreamNode = null;
    activeStreamText = "";
});

// MASS ACTIONS INTERFACES
document.getElementById("massDeleteBtn").onclick = () => {
    if (selectedChatsTrack.size === 0) return;
    if (confirm(`Are you sure you want to delete the ${selectedChatsTrack.size} selected chats?`)) {
        const targetIds = Array.from(selectedChatsTrack);
        socket.emit("delete selected chats", targetIds);
        selectedChatsTrack.clear();
        updateActionBarVisibility();
    }
};

document.getElementById("massRenameBtn").onclick = () => {
    if (selectedChatsTrack.size === 0) return;
    const title = prompt(`Enter a new title for the ${selectedChatsTrack.size} selected chats:`);
    if (title && title.trim()) {
        const targetIds = Array.from(selectedChatsTrack);
        socket.emit("mass rename chats", { chatIds: targetIds, newName: title.trim() });
        selectedChatsTrack.clear();
        updateActionBarVisibility();
    }
};

document.getElementById("form").onsubmit = (e) => {
    e.preventDefault();
    const txt = mainMessageInput.value.trim();
    if (!txt || !currentChat) return;
    
    appendMessage({ role: "user", content: txt });
    socket.emit("chat message", { chatId: currentChat, message: txt });
    
    mainMessageInput.value = "";
    mainMessageInput.style.height = "44px";
};

document.getElementById("newChat").onclick = () => socket.emit("new chat");
document.getElementById("clearLogsBtn").onclick = () => {
    if (confirm("Clear all logs in this session?")) {
        socket.emit("update characters", { chatId: currentChat, characters: chatData.characters, clearLogTrack: true });
    }
};

// UI Toggles
document.getElementById("menuToggle").onclick = () => {
    document.getElementById("sidebar").classList.add("open");
    document.getElementById("sidebarOverlay").classList.add("open");
};
document.getElementById("sidebarOverlay").onclick = closeMobileSidebar;
document.getElementById("logoutBtn").onclick = () => {
    localStorage.removeItem("sync_key");
    window.location.reload();
};
</script>
</body>
</html>
